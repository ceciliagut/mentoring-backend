name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile
        run: ./gradlew classes testClasses integrationTestClasses

      - name: Lint
        run: ./gradlew lintKotlin

      - name: Unit tests and architecture tests
        run: ./gradlew test

      - name: Integration tests
        run: ./gradlew integrationTest

      - name: Coverage verification
        run: ./gradlew koverVerify

      - name: Generate coverage report
        run: ./gradlew koverXmlReport

      - name: Post coverage comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('build/reports/kover/report.xml', 'utf8');

            // Extract LINE coverage only from the top-level report counter
            const lineCounter = xml.match(/<counter type="LINE" missed="(\d+)" covered="(\d+)"\/>/);
            if (!lineCounter) {
              console.log('No LINE coverage counter found in report');
              return;
            }
            const missed = parseInt(lineCounter[1]);
            const covered = parseInt(lineCounter[2]);
            const total = missed + covered;
            const pct = total === 0 ? 100 : Math.round((covered / total) * 100);
            const icon = pct >= 80 ? '✅' : '❌';
            const body = `### Coverage Report\n\n${icon} **${pct}%** line coverage (minimum: 80%)\n\n> ${covered} / ${total} lines covered`;

            // Update existing comment if present, otherwise create a new one
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.startsWith('### Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
